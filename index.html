<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radiohead - Karma Police Three.js</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
      canvas {
        display: block;
      }
      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(8, 8, 8, 0.65);
        color: #f4f4f4;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
        border-radius: 8px;
        user-select: none;
        pointer-events: none;
      }
      .hud .title {
        font-weight: 700;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <div
      id="startContainer"
      style="position: fixed; top: 20px; right: 20px; z-index: 999"
    >
      <button
        id="btnPlay"
        style="
          padding: 10px 20px;
          background: rgba(0, 0, 0, 0.7);
          border: 1px solid #fff;
          color: #fff;
          font-family: &quot;Consolas&quot;, monospace;
          font-size: 14px;
          cursor: pointer;
          border-radius: 5px;
          box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        "
      >
        Start animation
      </button>
    </div>
    <div class="hud" id="cameraHud">
      <div class="title">Camera Controls</div>
      <div>1: Camera Frontala (masina vine spre tine)</div>
      <div>2: Camera Interior (bord)</div>
      <div>3: Interior cinematic</div>
      <div>4: Front low (bot + faruri)</div>
      <div>5: Hood view</div>
      <div>6: Replay intro</div>
      <div>7: Fire front mode</div>
      <div>Sageti: stanga/dreapta pe X, sus/jos pe Y</div>
      <div>+ / -: zoom (FOV)</div>
      <div id="cameraModeText">Mod activ: Frontala</div>
      <div id="cameraOffsetText">Offset: x 0.00 y 2.00 z 8.50</div>
      <div id="cameraFovText">FOV: 75</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      // Importuri principale pentru Three.js
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      // Creez scena 3D (container pentru toate obiectele)
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        130,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.95;
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Variabile globale pentru materialele si modelele incarcate
      let roadMaterial;
      let grassMaterial;
      let carModel;

      // Variabile audio: loader si stare de redare
      let sound;
      let audioLoader;
      let audioStarted = false;
      let userClickedStart = false;

      // Stare a antrenarii/rupei (daca masina 'merge')
      let driveStarted = false;

      function initAudio() {
        const listener = new THREE.AudioListener();
        camera.add(listener);

        sound = new THREE.Audio(listener);

        audioLoader = new THREE.AudioLoader();
        audioLoader.load(
          "song.wav",
          function (buffer) {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            sound.setVolume(1);

            if (userClickedStart && !audioStarted) {
              sound.play();
              audioStarted = true;
            }
          },
          undefined,
          function (err) {
            console.error("Nu s-a incarcat melodia:", err);
          },
        );
      }
      initAudio();

      const cameraModeText = document.getElementById("cameraModeText");
      const cameraOffsetText = document.getElementById("cameraOffsetText");
      const cameraFovText = document.getElementById("cameraFovText");

      // Definitii pentru moduri de camera (offset-uri si tinta de privit)
      const cameraModes = {
        1: {
          name: "Frontala",
          offset: new THREE.Vector3(0, 13.7, 8.5),
          lookAhead: new THREE.Vector3(0, 1.2, 0.5),
          fov: 130,
          shake: false,
        },
        2: {
          name: "Interior",
          offset: new THREE.Vector3(0, 2.75, -1.05),
          lookAhead: new THREE.Vector3(0, 1.15, 7.5),
          fov: 130,
          shake: false,
        },
        3: {
          name: "Interior Cinematic",
          offset: new THREE.Vector3(-0.55, 2.62, -0.9),
          lookAhead: new THREE.Vector3(-0.2, 1.08, 7.8),
          fov: 108,
          shake: true,
        },
        4: {
          name: "Front Low",
          offset: new THREE.Vector3(0, 3.8, 7.2),
          lookAhead: new THREE.Vector3(0, 0.9, 1.0),
          fov: 92,
          shake: false,
        },
        5: {
          name: "Hood View",
          offset: new THREE.Vector3(1, 2.15, 1.8),
          lookAhead: new THREE.Vector3(0, 1.0, 12.0),
          fov: 88,
          shake: true,
        },
        7: {
          name: "Fire Front",
          offset: new THREE.Vector3(0, 3.9, 7.0),
          lookAhead: new THREE.Vector3(0, 1.1, 2.2),
          fov: 92,
          shake: false,
        },
      };

      let activeCameraMode = 1;
      const cameraMoveStep = 0.15;

      const worldCameraPos = new THREE.Vector3();
      const worldLookAtPos = new THREE.Vector3();
      const carBounds = new THREE.Box3();

      const clock = new THREE.Clock();

      let currentCameraPos = new THREE.Vector3(0, 20, 20);
      let currentLookAtPos = new THREE.Vector3(0, 10, 10);
      let targetCameraPos = new THREE.Vector3();
      let targetLookAtPos = new THREE.Vector3();

      let cameraShakeTime = 0;

      let introActive = false;
      let introPhase = "WAITING";
      let introTimer = 0;
      let introProgress = 0;
      const waitDuration = 4.0;
      const introDuration = 17.0;

      let isTransitioning = false;
      let currentFovTarget = 130;

      let leftHeadlight;
      let rightHeadlight;
      let leftHeadlightTarget;
      let rightHeadlightTarget;

      let fireGroup = null;
      let fireLight = null;
      let fireMode = false;
      const roadsidePoles = [];
      let runnerGroup = null;
      let runnerVisible = false;
      let runnerElapsed = 0;
      let runnerFinished = false;
      let runnerPhase = "approach";
      let runnerChaseOffset = 0;
      let leftArm;
      let rightArm;
      let leftLeg;
      let rightLeg;
      let torso;

      const poleSettings = {
        laneX: -12.5,
        spacing: 100,
        count: 18,
        minZ: -60,
        maxZ: 400,
        speed: 15,
      };

      const runnerSettings = {
        spawnDelay: 6.5,
        spawnZ: 210,
        laneX: -1.8,
        closingSpeed: 5.2,
        chaseZ: 36,
        chaseEnterZ: 44,
        chaseLerp: 0.08,
        chaseOffsetLerp: 0.03,
        chaseBobAmp: 0.9,
        minScale: 0.92,
        maxScale: 2.15,
        nearDistance: 32,
        farDistance: 240,
      };

      function alignCarToGround(model, groundY = 0, clearance = 0.03) {
        carBounds.setFromObject(model);
        const yOffset = groundY - carBounds.min.y + clearance;
        model.position.y += yOffset;
      }

      function createHeadlightsForCar(model) {
        leftHeadlight = new THREE.SpotLight(
          0xfaf6d2,
          0,
          260,
          Math.PI / 7,
          0.45,
          1,
        );
        rightHeadlight = new THREE.SpotLight(
          0xfaf6d2,
          0,
          260,
          Math.PI / 7,
          0.45,
          1,
        );

        leftHeadlight.userData.targetIntensity = 260;
        rightHeadlight.userData.targetIntensity = 260;

        leftHeadlight.position.set(-0.72, 0.72, 2.55);
        rightHeadlight.position.set(0.72, 0.72, 2.55);

        leftHeadlightTarget = new THREE.Object3D();
        rightHeadlightTarget = new THREE.Object3D();

        leftHeadlightTarget.position.set(-0.9, 0.2, 38);
        rightHeadlightTarget.position.set(0.9, 0.2, 38);

        model.add(leftHeadlight);
        model.add(rightHeadlight);
        model.add(leftHeadlightTarget);
        model.add(rightHeadlightTarget);

        leftHeadlight.target = leftHeadlightTarget;
        rightHeadlight.target = rightHeadlightTarget;
      }

      function createFireEffect(model) {
        fireGroup = new THREE.Group();

        const fireMaterial1 = new THREE.MeshBasicMaterial({
          color: 0xffaa33,
          transparent: true,
          opacity: 0.75,
          side: THREE.DoubleSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        const fireMaterial2 = new THREE.MeshBasicMaterial({
          color: 0xff5522,
          transparent: true,
          opacity: 0.55,
          side: THREE.DoubleSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        const flame1 = new THREE.Mesh(
          new THREE.PlaneGeometry(1.4, 2.2),
          fireMaterial1,
        );
        flame1.position.set(-0.45, 1.0, 2.9);

        const flame2 = new THREE.Mesh(
          new THREE.PlaneGeometry(1.3, 2.0),
          fireMaterial2,
        );
        flame2.position.set(0.4, 1.05, 2.95);

        const flame3 = new THREE.Mesh(
          new THREE.PlaneGeometry(0.9, 1.6),
          fireMaterial1.clone(),
        );
        flame3.position.set(0.0, 1.35, 2.75);

        fireGroup.add(flame1);
        fireGroup.add(flame2);
        fireGroup.add(flame3);

        fireGroup.visible = false;
        model.add(fireGroup);

        fireLight = new THREE.PointLight(0xff6a00, 0, 12, 2);
        fireLight.position.set(0, 1.2, 2.8);
        model.add(fireLight);
      }

      // Creeaza stalpi pe marginea drumului si fire vizuale (recycle pe Z)
      function createRoadsidePoles() {
        const towardRoad = poleSettings.laneX > 0 ? -1 : 1;

        const poleMaterial = new THREE.MeshStandardMaterial({
          color: 0x83603d,
          roughness: 0.9,
          metalness: 0.18,
        });

        const cableMaterial = new THREE.LineBasicMaterial({
          color: 0x595e66,
          transparent: true,
          opacity: 0.85,
        });

        const poleOffsetX = -15;

        const poleGeometry = new THREE.CylinderGeometry(0.13, 0.2, 11.8, 10);
        const armGeometry = new THREE.BoxGeometry(1.8, 0.1, 0.1);

        for (let i = 0; i < poleSettings.count; i += 1) {
          const z = poleSettings.maxZ - i * poleSettings.spacing;
          const poleGroup = new THREE.Group();

          const pole = new THREE.Mesh(poleGeometry, poleMaterial);
          pole.position.y = 5.9;
          pole.position.x = poleOffsetX;

          const arm = new THREE.Mesh(armGeometry, poleMaterial);
          arm.position.set(towardRoad * 0.62, 10.45, 0);
          arm.position.x = poleOffsetX;

          const tipTop = new THREE.Vector3(
            poleOffsetX + towardRoad * 1.45,
            10.45,
            0,
          );
          const tipMid = new THREE.Vector3(
            poleOffsetX + towardRoad * 1.12,
            9.85,
            0,
          );

          const topCableGeom = new THREE.BufferGeometry().setFromPoints([
            tipTop,
            new THREE.Vector3(poleOffsetX + towardRoad * 2.25, 10.1, 0),
            new THREE.Vector3(poleOffsetX + towardRoad * 3.4, 9.9, 0),
          ]);
          const midCableGeom = new THREE.BufferGeometry().setFromPoints([
            tipMid,
            new THREE.Vector3(poleOffsetX + towardRoad * 1.8, 9.5, 0),
            new THREE.Vector3(poleOffsetX + towardRoad * 2.8, 9.2, 0),
          ]);

          const topCable = new THREE.Line(topCableGeom, cableMaterial);
          const midCable = new THREE.Line(midCableGeom, cableMaterial);

          poleGroup.add(pole);
          poleGroup.add(arm);
          poleGroup.add(topCable);
          poleGroup.add(midCable);

          poleGroup.position.set(
            poleSettings.laneX + Math.sin(i * 0.8) * 0.4,
            0,
            z,
          );
          poleGroup.rotation.y = (Math.random() - 0.5) * 0.05;

          roadsidePoles.push(poleGroup);
          scene.add(poleGroup);
        }
      }

      // Actualizeaza pozitia stalpilor in timpul animatiei (miscare spre camera)
      function updateRoadsidePoles(dt) {
        for (const pole of roadsidePoles) {
          pole.position.z -= poleSettings.speed * dt;

          if (pole.position.z < poleSettings.minZ) {
            pole.position.z +=
              poleSettings.count * poleSettings.spacing + Math.random() * 3;
          }
        }
      }

      // Creeaza un personaj simplu procedural care alearga
      // (cap, trunchi, brate, picioare, pantofi)
      function createRunner() {
        runnerGroup = new THREE.Group();

        const clothes = new THREE.MeshStandardMaterial({
          color: 0x2f3138,
          roughness: 0.85,
          metalness: 0.05,
        });

        const skin = new THREE.MeshStandardMaterial({
          color: 0xb88463,
          roughness: 0.92,
          metalness: 0.0,
        });

        const shoeMat = new THREE.MeshStandardMaterial({
          color: 0x17181b,
          roughness: 0.9,
          metalness: 0.08,
        });

        torso = new THREE.Mesh(
          new THREE.BoxGeometry(0.52, 0.85, 0.24),
          clothes,
        );
        torso.position.set(0, 1.45, 0);

        const head = new THREE.Mesh(
          new THREE.SphereGeometry(0.2, 16, 16),
          skin,
        );
        head.position.set(0, 2.08, 0);

        leftArm = new THREE.Group();
        rightArm = new THREE.Group();
        leftLeg = new THREE.Group();
        rightLeg = new THREE.Group();

        const upperArmGeo = new THREE.BoxGeometry(0.14, 0.46, 0.14);
        const lowerLegGeo = new THREE.BoxGeometry(0.16, 0.58, 0.18);

        const leftArmMesh = new THREE.Mesh(upperArmGeo, clothes);
        leftArmMesh.position.y = -0.23;
        leftArm.add(leftArmMesh);
        leftArm.position.set(-0.36, 1.74, 0);

        const rightArmMesh = new THREE.Mesh(upperArmGeo, clothes);
        rightArmMesh.position.y = -0.23;
        rightArm.add(rightArmMesh);
        rightArm.position.set(0.36, 1.74, 0);

        const leftLegMesh = new THREE.Mesh(lowerLegGeo, clothes);
        leftLegMesh.position.y = -0.29;
        leftLeg.add(leftLegMesh);
        leftLeg.position.set(-0.16, 1.03, 0);

        const rightLegMesh = new THREE.Mesh(lowerLegGeo, clothes);
        rightLegMesh.position.y = -0.29;
        rightLeg.add(rightLegMesh);
        rightLeg.position.set(0.16, 1.03, 0);

        const leftShoe = new THREE.Mesh(
          new THREE.BoxGeometry(0.2, 0.08, 0.34),
          shoeMat,
        );
        leftShoe.position.set(0, 0.06, 0.1);
        leftLegMesh.add(leftShoe);

        const rightShoe = new THREE.Mesh(
          new THREE.BoxGeometry(0.2, 0.08, 0.34),
          shoeMat,
        );
        rightShoe.position.set(0, 0.06, 0.1);
        rightLegMesh.add(rightShoe);

        runnerGroup.add(torso);
        runnerGroup.add(head);
        runnerGroup.add(leftArm);
        runnerGroup.add(rightArm);
        runnerGroup.add(leftLeg);
        runnerGroup.add(rightLeg);

        runnerGroup.position.set(
          runnerSettings.laneX,
          0,
          runnerSettings.spawnZ,
        );
        runnerGroup.visible = false;
        scene.add(runnerGroup);
      }

      function resetRunner() {
        runnerElapsed = 0;
        runnerVisible = false;
        runnerFinished = false;
        runnerPhase = "approach";
        runnerChaseOffset = 0;

        if (runnerGroup) {
          runnerGroup.visible = false;
          runnerGroup.scale.setScalar(runnerSettings.minScale);
          runnerGroup.position.set(
            runnerSettings.laneX,
            0,
            runnerSettings.spawnZ,
          );
          runnerGroup.position.y = 0;
          leftArm.rotation.set(0, 0, 0);
          rightArm.rotation.set(0, 0, 0);
          leftLeg.rotation.set(0, 0, 0);
          rightLeg.rotation.set(0, 0, 0);
          torso.rotation.set(0, 0, 0);
          torso.position.y = 1.45;
        }
      }

      // Actualizeaza starea alergatorului: spawn, approach si chase
      // Controleaza si scalarea in functie de distanta pentru efect de "apropiere"
      function updateRunner(dt, elapsed) {
        if (!runnerGroup || runnerFinished) return;

        runnerElapsed += dt;

        if (!runnerVisible && runnerElapsed >= runnerSettings.spawnDelay) {
          runnerVisible = true;
          runnerGroup.visible = true;
        }

        if (!runnerVisible) return;

        if (runnerPhase === "approach") {
          runnerGroup.position.z -= runnerSettings.closingSpeed * dt;

          if (runnerGroup.position.z <= runnerSettings.chaseEnterZ) {
            runnerPhase = "chase";
            runnerChaseOffset = runnerGroup.position.z - runnerSettings.chaseZ;
          }
        } else if (runnerPhase === "chase") {
          runnerChaseOffset = THREE.MathUtils.lerp(
            runnerChaseOffset,
            0,
            runnerSettings.chaseOffsetLerp,
          );

          const targetZ =
            runnerSettings.chaseZ +
            runnerChaseOffset +
            Math.sin(elapsed * 0.9) * runnerSettings.chaseBobAmp;

          runnerGroup.position.z = THREE.MathUtils.lerp(
            runnerGroup.position.z,
            targetZ,
            runnerSettings.chaseLerp,
          );
        }

        const runCycle = elapsed * 9.0;
        leftLeg.rotation.x = Math.sin(runCycle) * 0.74;
        rightLeg.rotation.x = Math.sin(runCycle + Math.PI) * 0.74;
        leftArm.rotation.x = Math.sin(runCycle + Math.PI) * 0.95;
        rightArm.rotation.x = Math.sin(runCycle) * 0.95;
        leftArm.rotation.z = 0;
        rightArm.rotation.z = 0;
        torso.rotation.x = Math.sin(runCycle * 2.0) * 0.04;
        torso.position.y = 1.45;
        runnerGroup.position.y = Math.abs(Math.sin(runCycle * 2.0)) * 0.06;

        const dist = camera.position.distanceTo(runnerGroup.position);
        const t = THREE.MathUtils.clamp(
          (dist - runnerSettings.nearDistance) /
            (runnerSettings.farDistance - runnerSettings.nearDistance),
          0,
          1,
        );
        const targetScale = THREE.MathUtils.lerp(
          runnerSettings.maxScale,
          runnerSettings.minScale,
          t,
        );
        const smoothedScale = THREE.MathUtils.lerp(
          runnerGroup.scale.x,
          targetScale,
          0.12,
        );
        runnerGroup.scale.setScalar(smoothedScale);
      }

      function updateCameraHud() {
        const mode = cameraModes[activeCameraMode];
        cameraModeText.textContent = `Mod activ: ${mode.name}`;
        cameraOffsetText.textContent = `Offset: x ${mode.offset.x.toFixed(
          2,
        )} y ${mode.offset.y.toFixed(2)} z ${mode.offset.z.toFixed(2)}`;
        cameraFovText.textContent = `FOV: ${camera.fov.toFixed(0)}`;
      }

      function setCameraMode(modeId) {
        activeCameraMode = modeId;

        const mode = cameraModes[activeCameraMode];
        currentFovTarget = mode.fov ?? 130;

        isTransitioning = true;
        updateCameraHud();
      }

      function applyInteriorShake(basePos, time) {
        const x = Math.sin(time * 7.0) * 0.015;
        const y = Math.sin(time * 11.0) * 0.01;
        const z = Math.sin(time * 9.0) * 0.012;

        basePos.x += x;
        basePos.y += y;
        basePos.z += z;
      }

      function startIntroAnimation() {
        document.getElementById("cameraHud").style.display = "none";
        resetRunner();
        if (!audioStarted && sound && sound.buffer) {
          sound.play();
          audioStarted = true;
        }
        introActive = true;
        introProgress = 0;
        introPhase = "WAITING";
        introTimer = 0;
        introProgress = 0;
        camera.fov = cameraModes[5].fov;
        camera.updateProjectionMatrix();

        if (carModel) {
          const startOffset = new THREE.Vector3(0.0, 2.3, -2.5);
          const startLook = new THREE.Vector3(-10.0, 1.2, -15.0);

          currentCameraPos.copy(startOffset);
          currentLookAtPos.copy(startLook);

          carModel.localToWorld(currentCameraPos);
          carModel.localToWorld(currentLookAtPos);
        }
      }

      function getIntroCamera(carModel, progress) {
        const startOffset = new THREE.Vector3(0.0, 2.3, -2.5);
        const startLook = new THREE.Vector3(-10.0, 1.2, -15.0);

        const endOffset = cameraModes[5].offset.clone();
        const endLook = cameraModes[5].lookAhead.clone();

        const smooth = progress * progress * (3 - 2 * progress);

        const introCam = startOffset.clone().lerp(endOffset, smooth);
        const introLook = startLook.clone().lerp(endLook, smooth);

        introLook.x += Math.sin(smooth * Math.PI) * -15.0;
        introLook.y += Math.sin(smooth * Math.PI) * 1.5;

        const worldCam = introCam.clone();
        const worldLook = introLook.clone();

        carModel.localToWorld(worldCam);
        carModel.localToWorld(worldLook);

        return { worldCam, worldLook };
      }

      // Loader pentru fisiere GLTF/GLB: incarcam elementele statice si dinamice
      const loader = new GLTFLoader();
      // Incarcam scena (drum, iarba, fundal)
      loader.load("scene.glb", (gltf) => {
        const sceneGroup = gltf.scene;
        scene.add(sceneGroup);

        sceneGroup.traverse((child) => {
          if (child.isMesh) {
            // SETĂRI DRUM
            if (child.name.toLowerCase() === "road") {
              roadMaterial = child.material;
              if (roadMaterial.map) {
                const tex = roadMaterial.map;
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
              }
              roadMaterial.map.offset.x = 0.02;
            }

            // SETĂRI IARBĂ
            if (child.name.toLowerCase() === "grass") {
              grassMaterial = child.material;
              if (grassMaterial.map) {
                grassMaterial.map.wrapS = grassMaterial.map.wrapT =
                  THREE.RepeatWrapping;
                // Putem lăsa repetarea standard (1, 1) sau o putem mări dacă iarba pare "întinsă"
                grassMaterial.map.repeat.set(5, 5);
              }
            }
          }
        });
      });
      // Încărcăm MAȘINA (asigură-te că fișierul se numește exact car.glb)
      loader.load(
        "car.glb",
        (gltf) => {
          carModel = gltf.scene;
          alignCarToGround(carModel);

          carModel.position.x = -1.8;

          createHeadlightsForCar(carModel);
          createFireEffect(carModel);

          // Bec interior pentru habitaclu.
          const interiorLight = new THREE.PointLight(0xfff1c1, 18, 20, 1.5);
          interiorLight.position.set(0, 1.35, 0.25);
          carModel.add(interiorLight);

          scene.add(carModel);
        },
        undefined,
        (error) => {
          console.error("Eroare la mașină:", error);
        },
      );

      // Poziția camerei
      camera.position.set(0, 20, 20);
      camera.lookAt(0, 10, 10);

      // Handler pentru comenzi tastatura: schimbare mod camera, zoom, offset
      window.addEventListener("keydown", (event) => {
        const mode = cameraModes[activeCameraMode];

        if (event.code === "Digit1") {
          fireMode = false;
          if (fireGroup) fireGroup.visible = false;
          setCameraMode(1);
          return;
        }

        if (event.code === "Digit2") {
          fireMode = false;
          if (fireGroup) fireGroup.visible = false;
          setCameraMode(2);
          return;
        }

        if (event.code === "Digit3") {
          fireMode = false;
          if (fireGroup) fireGroup.visible = false;
          setCameraMode(3);
          return;
        }

        if (event.code === "Digit4") {
          fireMode = false;
          if (fireGroup) fireGroup.visible = false;
          setCameraMode(4);
          return;
        }

        if (event.code === "Digit5") {
          fireMode = false;
          if (fireGroup) fireGroup.visible = false;
          setCameraMode(5);
          return;
        }

        if (event.code === "Digit6") {
          fireMode = false;
          if (fireGroup) fireGroup.visible = false;
          startIntroAnimation();
          return;
        }
        if (event.code === "Digit7") {
          fireMode = true;
          if (fireGroup) fireGroup.visible = true;
          setCameraMode(7);
          return;
        }

        if (event.code === "ArrowLeft") {
          mode.offset.x -= cameraMoveStep;
          updateCameraHud();
          return;
        }

        if (event.code === "ArrowRight") {
          mode.offset.x += cameraMoveStep;
          updateCameraHud();
          return;
        }

        if (event.code === "ArrowUp") {
          mode.offset.y += cameraMoveStep;
          updateCameraHud();
          return;
        }

        if (event.code === "ArrowDown") {
          mode.offset.y -= cameraMoveStep;
          updateCameraHud();
          return;
        }

        if (event.code === "Equal" || event.code === "NumpadAdd") {
          camera.fov = Math.max(40, camera.fov - 2);
          camera.updateProjectionMatrix();
          updateCameraHud();
          return;
        }

        if (event.code === "Minus" || event.code === "NumpadSubtract") {
          camera.fov = Math.min(130, camera.fov + 2);
          camera.updateProjectionMatrix();
          updateCameraHud();
        }
      });

      updateCameraHud();

      // Lumină ambientală minimă ca să vedem ceva
      const ambient = new THREE.AmbientLight(0xffffff, 0.28);
      scene.add(ambient);

      const hemi = new THREE.HemisphereLight(0x8aa0ff, 0x0f120f, 0.22);
      scene.add(hemi);

      createRoadsidePoles();
      createRunner();

      const intensity = 190; // Puterea luminii
      const distance = 230; // Cât de departe să bată

      function creeazaFar(xPos) {
        const far = new THREE.SpotLight(0xffffff, intensity, distance);

        // Z = 2.5 este valoarea critică. Dacă farul e tot în mașină,
        // mărește la 3.0 sau 3.5 până vezi că „iese” prin față.
        far.position.set(xPos, 0.6, 2.5);

        far.angle = Math.PI / 6;
        far.penumbra = 0.5;
        far.decay = 1; // Face lumina să scadă natural în depărtare

        scene.add(far);

        // Ținta luminii (unde bat farurile)
        const target = new THREE.Object3D();
        target.position.set(xPos, 0, 10); // Bat în față, spre depărtare
        scene.add(target);
        far.target = target;
      }

      // Apelăm funcția de două ori pentru cele două faruri
      creeazaFar(-0.7); // Stânga
      creeazaFar(0.7); // Dreapta

      // Bucla principala de animatie: update si render la fiecare frame
      function animate() {
        requestAnimationFrame(animate);

        const dt = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        if (fireMode && fireGroup && fireLight) {
          fireLight.intensity = 2.8 + Math.sin(elapsed * 14.0) * 0.8;

          fireGroup.children.forEach((flame, i) => {
            flame.rotation.y = Math.sin(elapsed * (3.5 + i)) * 0.25;
            flame.scale.y = 1.0 + Math.sin(elapsed * (8.0 + i * 2.0)) * 0.12;
            flame.position.y =
              1.0 + i * 0.15 + Math.sin(elapsed * (9.0 + i)) * 0.08;
          });
        } else if (fireLight) {
          fireLight.intensity = 0;
        }

        if (driveStarted) {
          if (roadMaterial && roadMaterial.map) {
            roadMaterial.map.offset.y -= 0.00135;
          }

          if (grassMaterial && grassMaterial.map) {
            grassMaterial.map.offset.y -= 0.0035;
          }

          updateRoadsidePoles(dt);
          updateRunner(dt, elapsed);
        }

        if (driveStarted && leftHeadlight && rightHeadlight) {
          leftHeadlight.intensity +=
            (leftHeadlight.userData.targetIntensity - leftHeadlight.intensity) *
            0.03;

          rightHeadlight.intensity +=
            (rightHeadlight.userData.targetIntensity -
              rightHeadlight.intensity) *
            0.03;
        }

        if (carModel) {
          if (introActive) {
            if (introPhase === "WAITING") {
              introTimer += dt;
              if (introTimer >= waitDuration) {
                introPhase = "MOVING";
              }
            } else {
              introProgress += dt / introDuration;
              const p = Math.min(introProgress, 1);
              const introData = getIntroCamera(carModel, p);
              currentCameraPos.lerp(introData.worldCam, 0.08);
              currentLookAtPos.lerp(introData.worldLook, 0.08);

              camera.position.copy(currentCameraPos);
              camera.lookAt(currentLookAtPos);

              camera.fov += (cameraModes[5].fov - camera.fov) * 0.05;
              camera.updateProjectionMatrix();

              if (p >= 1) {
                introActive = false;
                driveStarted = true;
                setCameraMode(5);
              }
            }
          } else {
            const mode = cameraModes[activeCameraMode];

            targetCameraPos.copy(mode.offset);
            carModel.localToWorld(targetCameraPos);

            targetLookAtPos.copy(mode.lookAhead);
            carModel.localToWorld(targetLookAtPos);

            if (mode.shake) {
              applyInteriorShake(targetCameraPos, elapsed);
            }

            currentCameraPos.lerp(targetCameraPos, 0.08);
            currentLookAtPos.lerp(targetLookAtPos, 0.08);

            camera.fov += (currentFovTarget - camera.fov) * 0.08;
            camera.updateProjectionMatrix();
          }
        }

        camera.position.copy(currentCameraPos);
        camera.lookAt(currentLookAtPos);
        renderer.render(scene, camera);
      }
      animate();

      // Ajustare fereastră la resize
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Buton Start: porneste intro si audio la click
      document.getElementById("btnPlay").addEventListener("click", () => {
        userClickedStart = true;
        if (sound && sound.context && sound.context.state === "suspended") {
          sound.context.resume();
        }
        resetRunner();
        startIntroAnimation();
        document.getElementById("startContainer").style.display = "none";
      });
    </script>
  </body>
</html>
